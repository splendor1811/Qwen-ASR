_base_: base.yaml

data:
  train_jsonl: "data/processed/vivos_train.jsonl"
  val_jsonl: "data/processed/vivos_test.jsonl"

training:
  output_dir: "outputs/finetune_vivos"
  per_device_train_batch_size: 16
  per_device_eval_batch_size: 16
  num_train_epochs: 5
  save_steps: 200
  eval_steps: 200
  save_total_limit: 3

wandb:
  name: "finetune-vivos"
  tags:
    - "qwen3-asr"
    - "vietnamese"
    - "lora"
    - "vivos"

eval:
  benchmarks:
    - "vivos"
